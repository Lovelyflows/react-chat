<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Lovelyflows Branch</title>
    <style>
      body {
        background-color: #f9f9f9;
      }
      #flat-chat {
        width: 500px;
        height: 80%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="flat-chat"></div>
    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '66f2a4975b495ead28f4017e' },
              url: 'https://general-runtime.voiceflow.com',
              versionID: 'production',
              render: {
                mode: 'embedded',
                target: document.getElementById('flat-chat')
              },
            }).then(() => {
              window.voiceflow.chat.proactive.clear();
              
              setTimeout(() => {
                window.voiceflow.chat.proactive.push({ 
                  type: 'text', 
                  payload: { message: 'Har du frågor?' }
                });
              }, 10000);

              setTimeout(() => {
                window.voiceflow.chat.proactive.push({ 
                  type: 'text', 
                  payload: { message: 'Chatta med oss!' }
                });
              }, 12000);
            });
          }
          v.src = "https://lovelyflows.github.io/react-chat/packages/react-chat/dist/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>

  </body>
</html>
